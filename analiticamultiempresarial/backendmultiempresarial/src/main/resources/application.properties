spring.application.name=backendmultiempresarial

# --- Base de datos en memoria H2 (para clase) ---
spring.datasource.url=jdbc:h2:mem:multiempresarial
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Crea/actualiza las tablas automaticamente a partir de las entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Consola web de H2 disponible en  http://localhost:8080/h2-console
# (JDBC URL: jdbc:h2:mem:multiempresarial  | User: sa  | Password: vacio)
spring.h2.console.enabled=true

server.port=8080

# --- Para cambiar a MySQL en produccion, comente lo de H2 y use algo asi: ---
# spring.datasource.url=jdbc:mysql://localhost:3306/multiempresarial
# spring.datasource.username=root
# spring.datasource.password=tu_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
